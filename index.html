*{box-sizing:border-box;margin:0;padding:0}
:root{

  --text:#1A1917;--muted:#6B6860;--hint:#9E9C96;
  --accent:#534AB7;--r-md:8px;--r-lg:12px;
}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
header{background:var(--surface);border-bottom:.5px solid var(--border);padding:1rem 1.25rem;position:sticky;top:0;z-index:100}
.hi{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:var(--accent);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.ht{font-size:14px;font-weight:600}
.hs{font-size:11px;color:var(--muted)}
main{max-width:640px;margin:0 auto;padding:1.25rem}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:var(--surface2);border-radius:var(--r-md);padding:4px}
.tab{flex:1;padding:6px;border:none;border-radius:6px;background:none;font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
.tab.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-lg);padding:1rem 1.125rem}
.stat-lbl{font-size:11px;color:var(--muted);margin-bottom:4px}
.stat-num{font-size:28px;font-weight:600;letter-spacing:-1px}
.stat-desc{font-size:11px;color:var(--hint);margin-top:2px}
.search-w{position:relative;margin-bottom:1rem}
.search-w input{width:100%;padding:9px 12px 9px 36px;border:.5px solid var(--border-s);border-radius:var(--r-md);background:var(--surface);font-family:inherit;font-size:13px;color:var(--text);outline:none}
.search-w input:focus{border-color:var(--accent)}
.search-w i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--hint);font-size:16px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.fb{font-size:11px;padding:5px 12px;border-radius:20px;border:.5px solid var(--border-s);background:var(--surface);color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s}
.fb:hover{background:var(--surface2)}
.fb.on{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC;font-weight:500}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-lg);margin-bottom:8px;overflow:hidden}
.ch{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;transition:background .1s}
.ch:hover{background:var(--surface2)}
.badge{min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.b-hi{background:#EEEDFE;color:#3C3489}
.b-mid{background:#E1F5EE;color:#085041}
.b-lo{background:#F1EFE8;color:#5F5E5A}
.b-warn{background:#FAEEDA;color:#633806}
.ci{flex:1;min-width:0}
.cn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc{font-size:11px;color:var(--hint)}
.chv{color:var(--hint);font-size:16px;transition:transform .2s;flex-shrink:0}
.chv.open{transform:rotate(180deg)}
.pv-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--surface2);color:var(--muted);white-space:nowrap;flex-shrink:0}
.cb{border-top:.5px solid var(--border);padding:10px 14px 12px;display:none}
.cb.open{display:block}
.url-row{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.url-txt{font-size:11px;color:var(--hint);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ibt{background:none;border:none;cursor:pointer;color:var(--hint);font-size:14px;flex-shrink:0;padding:2px;text-decoration:none;display:inline-flex}
.ibt:hover{color:var(--accent)}
.km-id{font-size:11px;color:#534AB7;font-weight:500}
.km-link{font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:2px;text-decoration:none}
.km-link:hover{color:var(--accent)}
.km-none{font-size:11px;color:var(--hint);font-style:italic}
.erp{font-size:11px;color:var(--hint)}
.dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
.kb-right{flex:1;min-width:0}
.kb-name{font-size:12px;color:var(--text);line-height:1.5}
.km-row{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap}
.kbi{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:.5px solid var(--border)}
.kbi:last-child{border-bottom:none}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:13px}
footer{text-align:center;font-size:11px;color:var(--hint);padding:2rem 1rem 3rem}
@media(prefers-color-scheme:dark){
  :root{--bg:#1A1917;--surface:#242320;--surface2:#2E2C28;--border:rgba(255,255,255,.08);--border-s:rgba(255,255,255,.14);--text:#F0EEE9;--muted:#9E9C96;--hint:#6B6860}

  .b-mid{background:#04342C;color:#9FE1CB}

  .km-id{color:#AFA9EC}
}

// Group by SP URL
function groupBySP(raw, base) {
  const map={};
  raw.forEach(r=>{
    const key=r.url||('__no_sp_'+r.kb);
    if(!map[key]) map[key]={name:r.name,cat:r.cat,url:r.url,base,kbs:[]};
    map[key].kbs.push({n:r.kb,id:r.id,erp:r.erp,pv:r.pv});
  });
  return Object.values(map).sort((a,b)=>b.kbs.length-a.kbs.length);
}

  {name:'Bình giữ nhiệt Lock&Lock LHC4267',cat:'Gia dụng',url:'binh-ly-giu-nhiet/binh-giu-nhiet-inox-490ml-belt-bottle-lock-lock-lhc4267pik',base:BASE_DMX,kbs:[{n:'DropShip',id:'4555635',erp:'',pv:'KBĐB'}]},

  {name:'iPhone 17 512GB',cat:'Điện thoại',url:'dien-thoai/iphone-17-512gb',base:BASE_DMX,kbs:[{n:'KM loại trừ gói trả góp',id:'4555922',erp:'',pv:'KM'}]},
];

const TGDD_DATA = groupBySP(TGDD_RAW, BASE_TGDD);

let site='tgdd', filter='all', openSet=new Set();

function setSite(s,btn){
  site=s;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelector('.hs').textContent = s==='tgdd'?'TGDĐ Core Mới — Staging':'ĐMX Core Mới — Staging';
  openSet.clear();
  render();
}

function setF(f,btn){
  filter=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function bc(n){return n>=3?'b-hi':n===2?'b-mid':'b-lo'}

function pvBadge(pv){
  if(pv==='KBĐB') return '<span style="font-size:10px;padding:1px 6px;border-radius:10px;background:#EEEDFE;color:#3C3489">KBĐB</span>';
  return '<span style="font-size:10px;padding:1px 6px;border-radius:10px;background:#E1F5EE;color:#085041">KM</span>';
}

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const rawData = site==='tgdd'?TGDD_DATA:DMX_DATA;
  const filtered=rawData.filter(sp=>{
    const mf=filter==='all'
      ||(filter==='kb'&&sp.kbs.some(k=>k.pv==='KBĐB'))
      ||(filter==='km'&&sp.kbs.some(k=>k.pv==='KM'))
      ||(filter==='noid'&&sp.kbs.some(k=>!k.id));
    const mq=!q||sp.name.toLowerCase().includes(q)||sp.kbs.some(k=>k.n.toLowerCase().includes(q));
    return mf&&mq;
  });
  document.getElementById('cnt-sp').textContent=filtered.length;
  document.getElementById('cnt-kb').textContent=filtered.reduce((a,s)=>a+s.kbs.length,0);
  const list=document.getElementById('list');
  if(!filtered.length){list.innerHTML='<div class="empty"><i class="ti ti-search-off" style="font-size:22px;display:block;margin-bottom:6px"></i>Không tìm thấy</div>';return;}
  list.innerHTML=filtered.map((sp,si)=>{
    const open=openSet.has(si);
    const base=sp.base||(site==='tgdd'?BASE_TGDD:BASE_DMX);
    const hasUrl=sp.url&&sp.url.length>0;
    return `<div class="card">
      <div class="ch" onclick="tog(${si})">
        <div class="badge ${bc(sp.kbs.length)}">${sp.kbs.length}</div>
        <div class="ci"><div class="cn">${sp.name}</div><div class="cc">${sp.cat} · ${sp.kbs.length} kịch bản</div></div>
        <i class="ti ti-chevron-down chv ${open?'open':''}" aria-hidden="true"></i>
      </div>
      <div class="cb ${open?'open':''}">
        <div class="url-row">
          ${hasUrl
            ?`<div class="url-txt">${base}${sp.url}</div>
               <button class="ibt" title="Sao chép" onclick="cp(event,'${base}${sp.url}')"><i class="ti ti-copy"></i></button>
               <a class="ibt" href="${base}${sp.url}" target="_blank" title="Mở staging"><i class="ti ti-external-link"></i></a>`
            :`<div class="url-txt" style="font-style:italic">${sp.name}</div>`
          }
        </div>
        <div style="display:flex;flex-direction:column">
        ${sp.kbs.map((kb,i)=>`
          <div class="kbi">
            <div class="dot" style="background:${DOTS[i%DOTS.length]}"></div>
            <div class="kb-right">
              <div class="kb-name">${pvBadge(kb.pv)} ${kb.n}</div>
              <div class="km-row">
                ${kb.id&&kb.id!=='null'&&kb.id!==''
                  ?`<span class="km-id">ID ${kb.id}</span><a class="km-link" href="${PE}${kb.id}" target="_blank"><i class="ti ti-external-link" style="font-size:11px"></i> PE</a>`
                  :`<span class="km-none">Chưa có ID KM</span>`
                }
                ${kb.erp&&kb.erp!==''&&kb.erp!=='0000000000000'?`<span class="erp">· ERP: ${kb.erp}</span>`:''}
              </div>
            </div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

function tog(idx){if(openSet.has(idx))openSet.delete(idx);else openSet.add(idx);render();}
function cp(e,url){
  e.stopPropagation();
  navigator.clipboard.writeText(url).then(()=>{
    const b=e.currentTarget;b.innerHTML='<i class="ti ti-check"></i>';
    setTimeout(()=>{b.innerHTML='<i class="ti ti-copy"></i>';},1500);
  });
}
render();
</script>
